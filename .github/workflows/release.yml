name: Build Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential clang flex bison g++ gawk gcc-multilib gettext git libncurses-dev libssl-dev python3-setuptools rsync swig unzip zlib1g-dev file curl zstd
      - name: Build with the official OpenWrt SDK
        run: ./scripts/build-release.sh
      - uses: actions/upload-artifact@v4
        with:
          name: luci-app-mt5700m-${{ github.ref_name }}
          path: dist-release/*
          if-no-files-found: error
      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            gh release upload "${GITHUB_REF_NAME}" dist-release/* --clobber
          else
            gh release create "${GITHUB_REF_NAME}" dist-release/* --title "MT5700M Manager ${GITHUB_REF_NAME}" --generate-notes
          fi
